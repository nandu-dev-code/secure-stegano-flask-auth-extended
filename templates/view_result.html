<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Message Decrypted — StegoApp</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #eef2ff, #f8fafc);
      font-family: 'Inter', system-ui, sans-serif;
    }
    .card {
      background: #ffffff;
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      padding: 2.5rem;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
    }
    .success-icon {
      font-size: 3rem;
      color: #16a34a;
      margin-bottom: 0.5rem;
    }
    .message-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      padding: 1.25rem;
      color: #374151;
      font-size: 1rem;
      white-space: pre-wrap;
      margin-top: 1.5rem;
    }
    .btn-back {
      display: inline-block;
      margin-top: 2rem;
      background: #2563eb;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .btn-back:hover {
      background: #1d4ed8;
      transform: translateY(-1px);
    }
    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 2rem;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
  <div class="card w-full max-w-lg">
    <div class="success-icon">✅</div>
    <h1 class="text-2xl font-semibold text-green-600 mb-2">Message Decrypted Successfully!</h1>
    <p class="text-gray-500 mb-6 text-sm">Here’s the hidden message revealed from your media file:</p>

    <div class="message-box">
      {{ message }}
    </div>

    <a href="{{ url_for('dashboard') }}" class="btn-back">Back to Dashboard</a>

    <footer>© 2025 StegoApp — Privacy by Design 🔐</footer>
  </div>
</body>
</html>
